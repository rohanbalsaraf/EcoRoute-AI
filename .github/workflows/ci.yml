name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Linting (All Packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
          
      - name: Lint Python (API & Agent)
        run: |
          uvx ruff check .
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Lint Web & SDK
        run: |
          pnpm install
          pnpm run lint

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Lint Rust (Core)
        run: |
          cd packages/ecoroute-core
          cargo fmt --all -- --check

  rust-core:
    name: Rust Core (Validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cargo Check
        run: |
          cd packages/ecoroute-core
          cargo check
      - name: Cargo Test (Release Mode)
        run: |
          cd packages/ecoroute-core
          cargo test --release

  python-api:
    name: Python API (Hardened)
    runs-on: ubuntu-latest
    needs: rust-core
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecoroute
          POSTGRES_PASSWORD: ecoroute_password
          POSTGRES_DB: ecoroute_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Set up Rust (for maturin)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        
      - name: Build Rust Core (Production Build)
        run: |
          cd packages/ecoroute-core
          uv pip install --system maturin
          maturin build --release --out dist
          uv pip install --system dist/*.whl
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
          
      - name: Install API Dependencies
        run: |
          cd packages/ecoroute-api
          uv pip install --system -e .
          uv pip install --system pytest pytest-asyncio httpx
          
      - name: Run Integration Tests
        run: |
          cd packages/ecoroute-api
          pytest
        env:
          DATABASE_URL: postgresql://ecoroute:ecoroute_password@localhost:5432/ecoroute_test
          REDIS_URL: redis://localhost:6379/0
          CLERK_SECRET_KEY: sk_test_ZWNvcm91dGUtY2xlcmstbW9jay1zZWNyZXR0ZXN0
          LEMON_SQUEEZY_WEBHOOK_SECRET: test_secret
          SENTRY_DSN: ""

  web-frontend:
    name: Web Frontend & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install
          
      - name: Build Web
        run: pnpm --filter ecoroute-web run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZWNvcm91dGUtY2xlcmstbW9jay1rZXktest
          CLERK_SECRET_KEY: sk_test_ZWNvcm91dGUtY2xlcmstbW9jay1zZWNyZXR0ZXN0
          NEXT_PUBLIC_API_URL: http://localhost:8000
          
      - name: Install Playwright Browsers
        run: pnpm --filter ecoroute-web exec playwright install --with-deps
        
      - name: Run E2E Smoke Test
        run: pnpm --filter ecoroute-web run test:e2e
        continue-on-error: true # Allow failure until full E2E suite is stable
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZWNvcm91dGUtY2xlcmstbW9jay1rZXktest
          CLERK_SECRET_KEY: sk_test_ZWNvcm91dGUtY2xlcmstbW9jay1zZWNyZXR0ZXN0
          NEXT_PUBLIC_API_URL: http://localhost:8000

  ecoroute-agent:
    name: AI Agent (Validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install Dependencies
        run: |
          cd packages/ecoroute-agent
          uv pip install --system ../ecoroute-sdk .
      - name: Agent Check
        run: |
          cd packages/ecoroute-agent
          # Add agent-specific validation (e.g., ruff, pytest)
          uvx ruff check .

  mobile-check:
    name: Mobile (Expo) Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Install dependencies
        run: pnpm install
      - name: Expo Lint
        run: pnpm --filter ecoroute-mobile run lint
