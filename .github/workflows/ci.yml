name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Linting Tools
        run: |
          pip install flake8 black mypy
          # Node linting usually comes with the package
          
      - name: Lint Python (API)
        run: |
          cd packages/ecoroute-api
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Lint Rust (Core)
        run: |
          cd packages/ecoroute-core
          cargo fmt --all -- --check
        continue-on-error: true

  rust-core:
    name: Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cargo Check
        run: |
          cd packages/ecoroute-core
          cargo check
      - name: Cargo Test
        run: |
          cd packages/ecoroute-core
          cargo test

  python-api:
    name: Python API
    runs-on: ubuntu-latest
    needs: rust-core
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Set up Rust (for maturin)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        
      - name: Install dependencies
        run: |
          cd packages/ecoroute-api
          pip install -r requirements.txt
          pip install maturin pytest
          
      - name: Build & Install Rust Core
        run: |
          cd packages/ecoroute-core
          maturin develop
          
      - name: Run Tests
        run: |
          cd packages/ecoroute-api
          pytest
        env:
          DATABASE_URL: sqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          CLERK_SECRET_KEY: test_secret
          LEMONSQUEEZY_WEBHOOK_SECRET: test_secret

  web-frontend:
    name: Web Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'packages/ecoroute-web/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd packages/ecoroute-web
          npm install
          
      - name: Build Check
        run: |
          cd packages/ecoroute-web
          npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: test_key
          CLERK_SECRET_KEY: test_secret
          NEXT_PUBLIC_API_URL: http://localhost:8000

  ts-sdk:
    name: TS SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'packages/ecoroute-sdk-ts/package-lock.json'
          
      - name: Install dependencies
        run: |
          cd packages/ecoroute-sdk-ts
          npm install
          
      - name: Build & Test
        run: |
          cd packages/ecoroute-sdk-ts
          npm run build
          # npm test # Enable if tests are configured in package.json
