[project]
name = "ecoroute-api"
version = "0.1.0"
description = "EcoRoute REST API"
authors = [{ name = "EcoRoute Team" }]
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.30.1",
    "clerk-backend-api>=1.0.0",
    "redis>=5.0.4",
    "sqlalchemy>=2.0.30",
    "psycopg2-binary>=2.9.9",
    "python-dotenv>=1.0.1",
    "alembic>=1.18.4",
    "passlib>=1.7.4",
    "bcrypt>=5.0.0",
    "python-jose[cryptography]>=3.3.0",
    "svix>=1.24.0",
    "sentry-sdk[fastapi]>=2.0.0",
    "requests>=2.31.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "httpx>=0.28.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
