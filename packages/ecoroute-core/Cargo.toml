[package]
name = "ecoroute-core"
version = "0.1.0"
edition = "2024"

[lib]
name = "ecoroute_core"
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.23.0", features = ["extension-module"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
kdtree = "0.7"

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"
