[tool.poetry]
name = "ecoroute-api"
version = "0.1.0"
description = "EcoRoute REST API"
authors = ["EcoRoute Team"]

[tool.poetry.dependencies]
python = "^3.10"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.1"}
clerk-backend-api = "^1.0.0"
redis = "^5.0.4"
sqlalchemy = "^2.0.30"
psycopg2-binary = "^2.9.9"
python-dotenv = "^1.0.1"
alembic = "^1.18.4"
passlib = "^1.7.4"
bcrypt = "^5.0.0"
python-jose = {extras = ["cryptography"], version = "^3.3.0"}
svix = "^1.24.0"
sentry-sdk = {extras = ["fastapi"], version = "^2.0.0"}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.3,<10.0.0)",
    "httpx (>=0.28.1,<0.29.0)"
]
